<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Zenkai</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050507; color: #e4e4e7; font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #0e0e13; border: 1px solid #1a1a22; border-radius: 12px; padding: 3rem 2rem; max-width: 420px; width: 100%; margin: 1rem; text-align: center; }
        h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .desc { color: #a1a1aa; font-size: 0.82rem; margin-bottom: 1.5rem; }
        .msg { color: #a1a1aa; font-size: 0.88rem; line-height: 1.6; margin-top: 1rem; }
        .success { color: #34d399; }
        .error { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; }
        form { display: flex; flex-direction: column; gap: 0.6rem; }
        input { width: 100%; padding: 0.65rem 0.8rem; background: #050507; border: 1px solid #1a1a22; border-radius: 8px; color: #e4e4e7; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: rgba(52, 211, 153, 0.5); }
        input::placeholder { color: #3f3f46; }
        button { padding: 0.7rem; background: rgba(52, 211, 153, 0.15); color: #34d399; border: none; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: rgba(52, 211, 153, 0.25); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        a { color: #34d399; text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <h1>Reset Password</h1>
        <p class="desc">Enter your new password below.</p>
        <form id="form">
            <input type="password" id="pw" placeholder="New password (min 8 characters)" required minlength="8">
            <input type="password" id="confirm" placeholder="Confirm new password" required>
            <p class="error" id="err" style="display:none"></p>
            <button type="submit" id="btn">Reset Password</button>
        </form>
    </div>
    <script>
    (function() {
        var token = new URLSearchParams(window.location.search).get('token');
        var card = document.getElementById('card');

        if (!token) {
            card.innerHTML = '<h1>Invalid Link</h1><p class="msg" style="color:#f87171">No reset token found. Check the link in your email.</p>';
            return;
        }

        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var pw = document.getElementById('pw').value;
            var confirm = document.getElementById('confirm').value;
            var err = document.getElementById('err');
            var btn = document.getElementById('btn');

            err.style.display = 'none';

            if (pw !== confirm) {
                err.textContent = 'Passwords do not match.';
                err.style.display = 'block';
                return;
            }
            if (pw.length < 8) {
                err.textContent = 'Password must be at least 8 characters.';
                err.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                var resp = await fetch('https://api.zenkaicorp.com/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: pw })
                });
                var data = await resp.json();

                if (resp.ok) {
                    card.innerHTML = '<h1 class="success">Password Reset</h1><p class="msg">Your password has been reset. You can now log in with your new password in the app.</p>';
                } else {
                    err.textContent = data.detail || 'Reset failed. This link may have expired.';
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (ex) {
                err.textContent = 'Could not reach the server. Please try again.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    })();
    </script>
</body>
</html>
