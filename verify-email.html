<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — Zenkai</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050507; color: #e4e4e7; font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #0e0e13; border: 1px solid #1a1a22; border-radius: 12px; padding: 3rem 2rem; max-width: 420px; width: 100%; margin: 1rem; text-align: center; }
        h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .msg { color: #a1a1aa; font-size: 0.88rem; line-height: 1.6; margin-top: 1rem; }
        .success { color: #34d399; }
        .error { color: #f87171; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #27272a; border-top-color: #34d399; border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        a { color: #34d399; text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="spinner"></div>
        <h1>Verifying your email...</h1>
    </div>
    <script>
    (async function() {
        var card = document.getElementById('card');
        var token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            card.innerHTML = '<h1>Invalid Link</h1><p class="msg error">No verification token found. Check the link in your email.</p>';
            return;
        }

        try {
            var resp = await fetch('https://api.zenkaicorp.com/api/v1/auth/verify-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            var data = await resp.json();

            if (resp.ok) {
                card.innerHTML = '<h1 class="success">Email Verified</h1><p class="msg">Your email has been verified. You can close this page and return to the app.</p>';
            } else {
                card.innerHTML = '<h1>Verification Failed</h1><p class="msg error">' + (data.detail || 'This link may have expired or already been used.') + '</p><p class="msg"><a href="https://zenkaicorp.com">Back to zenkaicorp.com</a></p>';
            }
        } catch (e) {
            card.innerHTML = '<h1>Connection Error</h1><p class="msg error">Could not reach the server. Please try again later.</p>';
        }
    })();
    </script>
</body>
</html>
